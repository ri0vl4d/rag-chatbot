services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REINDEX_TOKEN
        sync: false
      - key: HF_HOME
        value: /opt/render/.cache/huggingface

  - type: web
    name: rag-chatbot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
